# work/expected_layers.yaml
# Section defaults + per-piece overrides for the audit's expected-layers check.
#
# Read by work/scripts/audit_state.py. For each piece, the audit:
#   1. Looks up defaults_by_section[piece.section] -> starting expected layers
#      (empty set if the section isn't listed; this is how `reference` is excluded
#      from defaults — see per_piece for 107 / 120).
#   2. Applies per_piece[<id>].add — extends the expected set.
#   3. Applies per_piece[<id>].remove — subtracts from the expected set.
#   4. Diffs against layers actually present in the piece's primary SVG.
#   5. Surfaces the diff as `expected_layers` + `missing_layers` per piece,
#      plus a convention check `expected-layers-present` (advisory) so the
#      failure shows up in the dashboard's bucket-chip menu automatically.
#
# Editing convention: defaults are coarse, per_piece is fine.
# Adding a layer to a section default flags every piece in that section that
# lacks it — that's the uplift mechanic. Per-piece add/remove is the escape
# hatch for known exceptions.
#
# This file is a v0 seed. It is INTENTIONALLY incomplete in per_piece. Pieces
# that don't match their section default will surface through the audit as
# they're authored, and get added here. Don't try to pre-author every exception.
#
# Layer name vocabulary — must match LAYER-CONVENTIONS.md and the audit's
# CANONICAL_LAYERS set:
#   silhouette  cutouts  folds-valley  folds-mountain
#   axles       glue-zones  labels  marks
#
# Section keys come straight from work/pieces.csv `section` column. Ten values:
#   framework  motor-wheel  middle-wheel  escapement  reduction-gear
#   anchor-pendulum  hands  weight  face-case  reference
# `reference` is intentionally absent from defaults_by_section — see per_piece
# entries for 107 and 120 for the policy on those.

defaults_by_section:

  # §II.A The Framework
  # Plates A-D mostly. U-channel frame strips, vertical strips, brackets,
  # wall-bracket box developments, pendulum-support spacers. Heavy fold + glue
  # work; landings (in `marks`) common because the framework is what other
  # pieces attach to. Axles only on the two main columns (4, 10).
  framework:        [silhouette, folds-valley, folds-mountain, glue-zones, marks]

  # §II.B The Mechanism
  # pieces.csv splits §II.B into four sub-sections; each gets its own default.
  # All four center on gear / pulley axles. Folds are common in motor-wheel
  # (pulleys, teeth strips) but rarer in the other three (mostly flat discs
  # with star-cut pinions). So motor-wheel keeps folds in the default; the
  # other three drop folds and add them per-piece.

  motor-wheel:      [silhouette, folds-valley, folds-mountain, glue-zones, axles, marks]
  middle-wheel:     [silhouette, axles, glue-zones, marks]
  escapement:       [silhouette, axles, glue-zones, marks]
  reduction-gear:   [silhouette, axles, glue-zones, marks]

  # §II.C The Anchor and the Pendulum
  # Anchor arm + bearing, pendulum rod + bob casing. Mix of folds (rod, bob
  # casing, anchor-bearing box), axles (anchor pivot at 65 / 69, pendulum
  # mount at 70 / 72), glue, and a few flat reinforcement pieces (93, 96, 99).
  # Default the high-frequency layers; per-piece handles the flats.
  anchor-pendulum:  [silhouette, folds-valley, folds-mountain, glue-zones, axles, marks]

  # §II.D Mechanism of the Hands
  # Hour-hand wheel, minute-hand wheel, hands tubes, small spacers. Axle-centric.
  # Some pieces have folds (tubes 76 / 77 / 80) and cutouts (star-cut wheels
  # 73 / 75; teeth on 78 / 79). Default the common case; per-piece for tubes,
  # star-cuts, and the flat spacers (91, 92).
  hands:            [silhouette, axles, glue-zones, marks]

  # §II.E The Weight
  # Weight cylinder + lid. Cylinder (101) and wrap (102) are folded; lid discs
  # (104 / 106) and the sawtooth strip (105) are flatter. Mostly folds in the
  # default; per-piece removes for the lids.
  weight:           [silhouette, folds-valley, folds-mountain, glue-zones, marks]

  # §II.F The Face and the Case
  # Face frame, case top + sides, clock face, hand silhouettes. Frame rails
  # (110 / 111 / 112 / 112a) and case (117 / 118 / 119) are folded; flat
  # exceptions (108 / 109 / 113-116 / 121) get per-piece removes.
  face-case:        [silhouette, folds-valley, folds-mountain, glue-zones, marks]

  # `reference` (pieces 107, 120) is intentionally NOT here. These are non-build
  # references — 107 is the axle-dimension reference + legend, 120 is the
  # cardboard axle-mount square (model for all mounting squares). Their
  # expected-layers are set explicitly in per_piece below.


