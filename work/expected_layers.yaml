  "054":
    add: [cutouts]
    # Star-cut pinion piece.

  "055":
    add: [folds-valley, folds-mountain]
    # Pinion: rolled cylinder pushed through 54's star.

  "056":
    add: [cutouts]
    # Star-cut pinion piece.

  "057":
    add: [cutouts]
    # Star-cut pinion piece.

