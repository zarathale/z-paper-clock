  # ============================================================================

  "082":
    add: [folds-valley, folds-mountain]
    # Reduction-gear accordion strip.

  "083":
    add: [folds-valley, folds-mountain]
    # Reduction-gear accordion strip.

  "087":
    add: [cutouts]
