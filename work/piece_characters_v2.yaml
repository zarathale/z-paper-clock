# work/piece_characters_v2.yaml
# Drafted by Cowork on 2026-05-03 from piece_characters.yaml (v1 export
# 2026-05-03T20:13:36Z). Schema v2 — designed backwards from layer signatures,
# per the 2026-05-03 schema-sharpen pass.
#
# ============================================================================
# WHY V2
# ============================================================================
# v1's 10 archetypes mixed two axes — physical structure (flat / folded / has
# axle / has cutout) and visual character (rail / bracket / disc / tube). The
# audit in M0.7 wants the first axis (it determines expected_layers); humans
# want the second (visual triage). v2 separates them:
#
#   character   — small fixed set; each value = unique layer signature.
#                 Drives expected_layers.yaml + the audit.
#   subtype     — free-form string; describes physical / functional variant
#                 within a character. Drives bucket-strategy hints, viewer
#                 grouping, and human comprehension. Allowed to grow.
#
# This dissolves the v1 gear-disc / pinion-stack-disc fuzziness. The question
# is no longer "is this disc pinion-shaped?" (subjective); it's "does it have
# an interior cutout in addition to an axle?" (yes / no). Star-cutout discs,
# hands-wheel discs with pinion-mount holes, and reduction-gear discs with cut-
# out centers all share one character (flat-axle-cutout) and differ only in
# subtype.
#
# ============================================================================
# CHARACTER (8 values)
# ============================================================================
# Each maps to a unique layer signature. Glue-zones, labels, and marks are
# implicit in every non-reference character (audit will assert them).
#
#   flat              silhouette + (glue) + labels + marks
#                     Flat piece, no folds, no axles, no cutouts.
#                     Examples: hands, clock face, decorative crescent,
#                     simple laminated panels, indicator discs without axle.
#
#   flat-cutout       silhouette + cutouts + (glue) + labels + marks
#                     Flat piece with interior hole(s). No folds, no axles.
#                     Examples: square ring (071), tab-rings (043, 044),
#                     cross-shaped face brace with hole (113).
#
#   flat-axle         silhouette + axles + (glue) + labels + marks
#                     Flat piece with axle. No folds, no cutouts.
#                     Examples: most gear-discs, escape-wheel discs, anchor arm
#                     (which is a flat shape pivoting on axle, not a disc).
#
#   flat-axle-cutout  silhouette + axles + cutouts + (glue) + labels + marks
#                     Flat piece with axle AND interior cutout. THIS IS WHERE
#                     YOUR PINION-STACK-DISC AND CUTOUT-GEAR-DISC PIECES
#                     CONVERGE. The cutout shape (star / square / round) lives
#                     in the subtype.
#                     Examples: pinion-mount discs (053, 054, 056, 057, 061,
#                     062, 063, 064), hands-wheel discs with cutouts (075,
#                     078, 087), motor-wheel face with star-cut (038).
#
#   folded            silhouette + folds-V + folds-M + glue + labels + marks
#                     Anything that folds. No axles, no cutouts.
#                     Examples: frame rails, brackets, tubes, boxes, teeth-
#                     strips, accordion strips. The visual variant lives in
#                     the subtype (frame-rail / bracket-tab / bracket-l /
#                     bracket-wall / box-cross / box-wall-bracket / tube-* /
#                     teeth-strip / pinion-tube / triangle-spacer).
#
#   folded-axle       silhouette + folds-V + folds-M + glue + axles + (cutouts) + labels + marks
#                     Folded form that also bears an axle.
#                     Examples: frame columns 004/010 with axle bearings,
#                     anchor-bearing box (069), minute-hand holder tube (077,
#                     pair-tag — see below), face-frame braces with axle
#                     hole (115, 116) IF they fold.
#
#   reference         (no layer expectations)
#                     Non-build pieces. Excluded from audit.
#                     Members: 107, 120 — though 120 is contested; see notes.
#
# ============================================================================
# SUBTYPE
# ============================================================================
# Free-form string. Conventions used in this draft:
#
#   Frame:        frame-rail, frame-rail-axle, frame-rail-face
#   Brackets:     bracket-tab, bracket-l, bracket-wall, bracket-cross
#   Boxes:        box-cross, box-small, box-wall-bracket, box-anchor-bearing,
#                 box-case-top, triangle-spacer-motor
#   Tubes:        tube-pulley, tube-pulley-drum, tube-pulley-string-wind,
#                 tube-pendulum-blade, tube-bob-casing, tube-weight-cylinder,
#                 tube-weight-label-wrap, tube-minute-hand-holder, tube-strap,
#                 tube-wheel-cover, tube-rolled-pinion
#   Teeth:        teeth-strip-motor, teeth-strip-reduction, teeth-strip-hook,
#                 teeth-strip-accordion-pulley, teeth-strip-sawtooth-weight
#   Discs:        gear-face, gear-back, motor-wheel-face, motor-wheel-back,
#                 escape-wheel, escape-wheel-back, middle-wheel, middle-wheel-back,
#                 reduction-gear, pulley-disc, pulley-plate, pulley-plate-back,
#                 plate-cap, lid-weight, hands-wheel-hour, hands-wheel-hour-back,
#                 hands-wheel-star, spacer-disc, indicator-bob
#   Pinion mounts: pinion-mount-middle, pinion-mount-escape, pinion-mount-motor,
#                 pinion-mount-hands
#   Anchor parts: anchor-arm, anchor-fork, plate-anchor-rear, blade-pendulum,
#                 ring-square-pendulum, pendulum-rod, hook-pendulum
#   Bob parts:    bob-face, bob-retainer, bob-brace, reinforcement-cardboard,
#                 crescent-decorative
#   Frame braces: face-brace-cross, face-brace-cross-axle, face-brace-cross-hole,
#                 spacer-pendulum-support, wedge-wall-bracket, spacer-cardboard
#   Hands:        hand-minute, hand-hour
#   Case:         case-side, face-clock
#   Misc rings:   ring-tab-pulley
#   Other:        tongue-oval, oval-elongated, tongue-narrow-hands
#
# ============================================================================
# CONTROLS (new field, added 2026-05-03)
# ============================================================================
# Optional. List of UI-bound parameters this piece exposes to the final viewer.
# Forward-looking — full schema settles in M6 (mechanism animation), but
# captured now for any piece whose physical role is to be user-adjustable.
#
# First example: piece 100 (bob-position indicator disc) drives the pendulum
# period via its position on the rod; the viewer's master fast/slow control
# binds to its `bob-position` parameter.
#
# Skeleton:
#   controls:
#     - parameter: <slug>           # e.g. bob-position, escape-rate
#       type: scalar | toggle       # discrete enum cases TBD
#       semantics: "<one-paragraph description of what the parameter
#                    physically does and how it maps to clock behavior>"
#       ui_hint: "<optional rendering hint for the viewer>"
#
# Pieces with controls blocks are the input surface for M6's mechanism
# animation; the audit doesn't validate this field today.
#
# ============================================================================
# STATUS
# ============================================================================
# Optional. Values:
#   uncertain    — carried over from v1 export; needs pair-tag.
#   pair-tag     — Cowork flagged for joint review (specific reason in note).
#   pending      — piece not yet in source/pieces/; tagged speculatively.
#
# ============================================================================
# CLARIFICATIONS (added 2026-05-03 during pair-tag walkthrough)
# ============================================================================
# 1. flat and folded are AGNOSTIC about whether glue is structural (binds
#    folds, holds tabs) or laminate (back-to-back, onto cardboard). The
#    character only cares whether the layer set (silhouette / cutouts /
#    axles / folds-V / folds-M / glue / labels / marks) is present. v1's
#    flat-decorative vs flat-laminate distinction collapses correctly into
#    a single flat character; the laminate-vs-decorative read lives in
#    subtype and notes.
#
# 2. Sliding axles count as axles. Any wire / pin / rod that passes through
#    a piece counts as an axle marker on the axles layer, regardless of
#    whether the piece pivots around it, slides along it, or is held static.
#    The motion semantics are captured by the piece's controls block (above)
#    or by the M2+ JSON sidecar's function block — not by the layer's
#    presence or absence. Test case: piece 100 (bob-position disc) slides
#    along the pendulum rod; its rod-pass-through hole is an axle marker;
#    its sliding behavior is in the controls block.
#
# ============================================================================
# COUNTS (post-walkthrough, 2026-05-03)
# ============================================================================
# tagged: 122
# pair-tag remaining: 1 (piece 041 — Alan re-reading instructions)
# pending captures: 6 (013, 014, 016, 017, 090, 110 — speculative tags)
# character distribution:
#   flat              : 28
#   flat-cutout       :  4
#   flat-axle         : 28   (gained 100 + 120; lost 092 to flat-axle which
#                              was already there in v2 draft)
#   flat-axle-cutout  : 17
